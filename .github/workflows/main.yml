name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller schema_sgs.spec

      - name: Prepare release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\bundle -Force
          Copy-Item -Path dist\LeSchemaSGS.exe -Destination dist\bundle\
          Copy-Item -Path assets -Destination dist\bundle\assets -Recurse
          Copy-Item -Path README.md -Destination dist\bundle\
          Copy-Item -Path INSTALL.md -Destination dist\bundle\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeSchemaSGS-windows
          path: dist/bundle/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LeSchemaSGS-windows
          path: dist/bundle

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path dist\bundle\* -DestinationPath LeSchemaSGS-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LeSchemaSGS-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
